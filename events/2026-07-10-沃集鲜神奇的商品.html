  <script>
    (function () {
      // Lightbox for inline images (ec-img class)
      var overlay = document.createElement('div');
      overlay.id = 'ec-lightbox';
      overlay.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;cursor:zoom-out;align-items:center;justify-content:center;';
      var lightboxImg = document.createElement('img');
      lightboxImg.style.cssText = 'max-width:92vw;max-height:92vh;border-radius:6px;box-shadow:0 4px 32px rgba(0,0,0,.6);';
      overlay.appendChild(lightboxImg);
      document.body.appendChild(overlay);

      function openLightbox(src) {
        lightboxImg.src = src;
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        overlay.style.display = 'none';
        document.body.style.overflow = '';
      }

      overlay.addEventListener('click', closeLightbox);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLightbox();
      });

      document.querySelectorAll('.ec-img').forEach(function(img) {
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', function() {
          var preview = img.getAttribute('data-preview') || img.src;
          openLightbox(preview);
        });
      });
    })();
  </script>
