name: Deploy Event Cloud

on:
  push:
    branches:
      - main
      - master
  repository_dispatch:
    types:
      - graph-update

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout Event Cloud
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.EVENT_CLOUD_PAT }}
          submodules: true
          fetch-depth: 0

      - name: Configure Git for Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Update Graph Submodule
        run: |
          git submodule update --remote --merge
          git add graph
          if git diff --cached --quiet; then
            echo "No submodule changes."
          else
            git commit -m "Update graph submodule"
            git push origin ${{ github.ref_name }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Generate Site
        run: npx evc generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.EVENT_CLOUD_PAT }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "Deploy Event Cloud - ${{ github.event_name == 'repository_dispatch' && 'Triggered by evc deploy' || 'Graph updated' }}"