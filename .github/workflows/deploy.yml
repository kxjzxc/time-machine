name: Deploy Event Cloud

on:
  push:
    branches:
      - main
      - master
  repository_dispatch:
    types:
      - deploy

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Event Cloud
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.EVENT_CLOUD_PAT }}
          submodules: true
          fetch-depth: 0

      - name: Configure Git for Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Update Graph Submodule
        run: |
          git submodule update --remote --merge
          git add graph
          if git diff --cached --quiet; then
            echo "No submodule changes."
          else
            git commit -m "Update graph submodule"
            git push origin main
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Generate Site
        run: npx evc generate

      - name: Set deploy commit message
        id: deploy-msg
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "value=Deploy Event Cloud - Triggered by evc deploy" >> "$GITHUB_OUTPUT"
          else
            echo "value=Deploy Event Cloud - Graph updated" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.EVENT_CLOUD_PAT }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: ${{ steps.deploy-msg.outputs.value }}
