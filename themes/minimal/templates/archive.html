<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="event-data" style="display:none">{{ eventsJson }}</div>
  
  <a href="index.html" class="back-home">← 返回</a>
  
  <div class="archive-page">
    <header class="archive-header">
      <h1>事件档案</h1>
      <p>探索所有已解锁的事件</p>
    </header>
    
    <div class="archive-controls">
      <input type="text" id="archive-search" class="archive-search" placeholder="搜索事件...">
      <div id="tag-filter" class="tag-filter"></div>
    </div>
    
    <div id="archive-grid" class="archive-grid"></div>
  </div>
  
  <div id="card-modal" class="card-modal">
    <div class="card">
      <div class="card-header">
        <div>
          <div id="card-date" class="card-date"></div>
          <h2 id="card-title" class="card-title"></h2>
        </div>
        <button id="card-close" class="card-close">×</button>
      </div>
      
      <div id="card-body" class="card-body">
        <div id="card-content" class="card-content"></div>
        <div id="card-media" class="card-media"></div>
        <div id="card-tags" class="card-tags"></div>
        <div id="card-links" class="card-links"></div>
      </div>
      
      <div class="card-footer">
        <div class="card-actions">
          <button id="btn-random" class="action-btn random-btn">
            <span>→</span>
            <span>下一站</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/app.js"></script>
</body>
</html>
